version: '3.8'

services:
  kafka:
    image: 'confluentinc/cp-kafka:latest'
    container_name: kafka
    ports:
      - '9092:9092'
    environment:
      # --- KRaft Mode Configuration ---
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # CRITICAL: KRaft requires a Cluster ID
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' 
      
      # --- Listener Configuration ---
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      
      # --- Other Settings ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data # This maps your volume to the container

  # NOTE: This consumer application logic should ideally be deployed as a completely separate project stack!
  # It is left here commented out for historical reference.
  # kafka_consumer:
  #   image: kafka_consumer:latest
  #   container_name: kafka_consumer
  #   depends_on:
  #     - kafka
  #   volumes:
  #     - /data/secrets/gcp-creds.json:/root/.config/gcloud.json:ro
  #   environment:
  #     - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud.json



volumes:
  kafka_data:
    driver: local