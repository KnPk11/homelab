version: '3.8'

services:
  immich-server:
    container_name: immich
    image: ghcr.io/immich-app/immich-server:v1.140.1
    volumes:
      - /mnt/pool/Apps/Immich/uploads:/data
      - /etc/localtime:/etc/localtime:ro
    expose:
      - 2283
    environment:
      - DB_HOSTNAME=immich_db
      - DB_USERNAME=immich
      - DB_PASSWORD_FILE=/run/secrets/immich_database_password
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich_redis
    secrets:
      - immich_database_password
    networks:
      - caddy_public
      - immich_internal
    depends_on:
      - immich_redis
      - immich_db
    restart: unless-stopped
    healthcheck:
      disable: false
    user: "1000:1000"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.50'
          memory: 512M

  immich-machine-learning:
    container_name: immich_ml
    image: ghcr.io/immich-app/immich-machine-learning:v1.140.1
    environment:
      - DB_HOSTNAME=immich_db
      - DB_USERNAME=immich
      - DB_PASSWORD_FILE=/run/secrets/immich_database_password
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich_redis
    secrets:
      - immich_database_password
    volumes:
      - immich-model-cache:/cache
    networks:
      - immich_internal
    restart: unless-stopped
    healthcheck:
      disable: false
    user: "1000:1000"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 2048M
        reservations:
          cpus: '0.50'
          memory: 512M

  immich_redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:a137a2b60aca1a75130022d6bb96af423fefae4eb55faf395732db3544803280
    networks:
      - immich_internal
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  immich_db:
    container_name: immich_db
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:32324a2f41df5de9efe1af166b7008c3f55646f8d0e00d9550c16c9822366b4a
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/immich_database_password
      - POSTGRES_USER=immich
      - POSTGRES_DB=immich
      - POSTGRES_INITDB_ARGS='--data-checksums'
    secrets:
      - immich_database_password
    networks:
      - immich_internal
    volumes:
      - /srv/immich/pgdata:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - KILL
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M


volumes:
  immich-model-cache:

networks:
  caddy_public:
    external: true
  immich_internal:

secrets:
  immich_database_password:
    file: ${IMMICH_DB_PASSWORD_PATH:-/srv/immich/immich_database_password.secret}