server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://192.168.50.95:3100/loki/api/v1/push

scrape_configs:
- job_name: mikrotik_logs
  static_configs:
  - targets:
      - localhost
    labels:
      job: mikrotik
      __path__: /mnt/logs/mikrotik/*.log
