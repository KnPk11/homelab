version: '3.8'

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.1.3
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3003:3001"
    # networks:
    #   - caddy_public
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    volumes:
      - uptime-kuma-data:/app/data
    environment:
      - TZ=Europe/London
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  uptime-kuma-data:

