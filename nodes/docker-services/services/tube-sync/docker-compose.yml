version: '3.8'

services:
  tubesync:
    image: ghcr.io/meeb/tubesync:latest
    container_name: tubesync
    restart: unless-stopped
    ports:
      - "127.0.0.1:4848:4848"
      - "192.168.50.98:4848:4848"
    volumes:
      - /srv/tubesync/config:/config
      - /mnt/pool/Downloads/TubeSync:/downloads
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=1000
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - NET_RAW
      - SYS_CHROOT
      - SYS_ADMIN   # definitely never give this
      - SYS_MODULE
      - SYS_PTRACE
      - SYS_RAWIO
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.50'
          memory: 256M