version: '3.8'

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.10.7
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
    security_opt:
      - no-new-privileges
    volumes:
      - /srv/jellyfin/config:/config
      - /mnt/pool/Media:/data/media/
      - /mnt/pool/Downloads:/data/downloads/
    expose:
      - 80
    networks:
      - caddy_public
    devices:
      - /dev/dri:/dev/dri              # Required for VAAPI/OpenGL hardware accel
      - /dev/video19:/dev/video19      # Required for hardware HEVC decoding
    restart: unless-stopped
    cap_drop:
      - AUDIT_CONTROL
      - MKNOD
      - SYS_ADMIN
      - SYS_MODULE
      - SYS_PTRACE
      - SYS_TIME
      - SYSLOG
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 2048M
        reservations:
          cpus: '1.00'
          memory: 512M

networks:
  caddy_public:
    external: true