version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    user: 1000:1000
    environment:
      - MTX_RTSPTRANSPORTS=tcp
      - MTX_WEBRTCADDITIONALHOSTS=${MEDIAMTX_DOMAIN:-mediamtx.example.com}
      - MTX_LOGDESTINATIONS=stdout,file
      - MTX_LOGFILE=/logs/mediamtx.log
    ports:
      - "8554:8554"               # RTSP (TCP)
      - "1935:1935"               # RTMP (TCP)
      - "8888:8888"               # HTTP (TCP)
    volumes:
      - /srv/mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - /srv/mediamtx/logs:/logs
    restart: unless-stopped
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 512M