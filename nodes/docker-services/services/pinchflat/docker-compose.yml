version: '3.8'

services:
  vpn-secure-wireguard:
    image: linuxserver/wireguard:arm64v8-latest
    container_name: vpn-secure-wireguard
    cap_add:
      - NET_ADMIN        # Needed for WireGuard to modify network stack
      - SYS_MODULE       # Only needed if module insertion at runtime is required
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - NET_RAW          # Prevents raw packet access (unless needed for ping)
      - SYS_PTRACE
      - SYS_CHROOT
      - SYS_RAWIO
      - SYS_ADMIN        # Never grant this
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=0
    volumes:
      - ${WIREGUARD_CONFIG_PATH:-/srv/vpns/vpn-secure-wireguard/uk-3.conf}:/config/wg0.conf
    expose:
      - 8945
    networks:
      - caddy_shared
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  pinchflat:
    image: keglin/pinchflat:v2025.6.6
    container_name: pinchflat
    environment:
      - TZ=Europe/London
      - UMASK=022
    network_mode: "service:vpn-secure-wireguard"
    depends_on:
      - vpn-secure-wireguard
    volumes:
      - /srv/pinchflat/config:/config
      - /mnt/pool/Downloads/PinchFlat:/downloads
    restart: unless-stopped
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - NET_RAW
      - SYS_CHROOT
      - SYS_ADMIN   # definitely never give this
      - SYS_MODULE
      - SYS_PTRACE
      - SYS_RAWIO
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.50'
          memory: 512M

networks:
  caddy_shared:
    external: true