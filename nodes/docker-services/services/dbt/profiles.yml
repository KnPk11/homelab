bigquery_profile:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: ${GCP_PROJECT_ID} # GCP Project ID
      dataset: analytics # The BigQuery dataset to work on
      threads: 2
      keyfile: /root/.dbt/gcp-creds.json # Auth secret


postgres_profile:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres_db
      user: postgres
      # password: "{{ env_var('POSTGRES_PASSWORD') }}"
      password: ${POSTGRES_PASSWORD} # Not the best place
      port: 5432
      dbname: main_db
      schema: public
      threads: 2