version: '3.8'

services: 
  samba:
    image: dperson/samba:latest
    container_name: smb
    ports:
      - "139:139"
      - "445:445"
    secrets:
      - password_standard
    volumes:
      - /srv/smb/smb.conf:/etc/samba/smb.conf
      - /srv/smb/entrypoint.sh:/entrypoint.sh:ro
      - /mnt/pool:/shares
      - /srv/smb/state:/var/lib/samba 
    entrypoint: ["/entrypoint.sh"]
    restart: unless-stopped
    network_mode: host # firewall managed by UFW
    cap_drop:
      - ALL
    cap_add:
      # Allows binding to ports 139 and 445
      - CAP_NET_BIND_SERVICE
      # Allows changing user and group IDs, critical for Samba
      - CAP_SETUID
      - CAP_SETGID
      # Allows bypassing file read and directory search permissions
      - CAP_DAC_READ_SEARCH
    healthcheck:
      # Check if port 445 is open on localhost. 
      # If netstat is not available, we can use a simpler exit 0 to trust the process.
      test: ["CMD-SHELL", "netstat -tan | grep 445 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M


secrets:
  password_standard:
    file: /srv/smb/.secrets/password_standard.secret