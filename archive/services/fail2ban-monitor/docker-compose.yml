version: '3.8'

services:
  fail2ban_monitor:
    image: fail2ban_monitor:latest
    container_name: fail2ban_monitor
    restart: unless-stopped
    ports:
      - "9002:9002"
    command: ["python3", "/usr/local/bin/fail2ban_bans.py"]
    volumes:
      - /var/log:/var/log:ro
      - /data/custom_images/fail2ban_monitor/fail2ban_bans.py:/usr/local/bin/fail2ban_bans.py:ro
      - /var/log/crowdsec.log:/var/log/crowdsec.log:ro
    environment:
      - TZ=Europe/London
      - PYTHONUNBUFFERED=1
    networks:
      - caddy_private
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M


networks:
  caddy_private:
    external: true