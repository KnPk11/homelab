bundleVersion: 1.1.1-2025-10-16
bundleFormat: 1
externalAddr:
    - ${ANYTYPE_DOMAIN}
    - ${SERVER_IP}
configId: ${CONFIG_ID}
networkId: ${NETWORK_ID}
storagePath: ./data/storage/
account:
    peerId: ${PEER_ID}
    peerKey: ${PEER_KEY}
    signingKey: ${SIGNING_KEY}
network:
    listenTCPAddr: 0.0.0.0:33010
    listenUDPAddr: 0.0.0.0:33020
coordinator:
    mongoConnect: mongodb://mongo:27017/?replicaSet=rs0
    mongoDatabase: coordinator
consensus:
    mongoConnect: mongodb://mongo:27017/?replicaSet=rs0&w=majority
    mongoDatabase: consensus
filenode:
    redisConnect: redis://redis:6379/
