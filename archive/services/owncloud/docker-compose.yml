version: '3.8'

services:
  owncloud:
    image: owncloud/server:10.15.2
    container_name: owncloud
    restart: always
    expose:
      - "8080"
    networks:
      - caddy_shared
      - owncloud_internal
    depends_on:
      - owncloud_db
      - owncloud_redis
    environment: # Apparently doesn't support _FILE directive, so secrets not working
      - OWNCLOUD_TRUSTED_DOMAINS=localhost,example.asuscomm.com,192.168.50.98
      - OWNCLOUD_DB_TYPE=mysql
      - OWNCLOUD_DB_NAME=owncloud
      - OWNCLOUD_DB_USERNAME=owncloud
      - OWNCLOUD_DB_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - OWNCLOUD_DB_HOST=owncloud_db
      - OWNCLOUD_ADMIN_USERNAME=Kon # At least 3 letters
      - OWNCLOUD_ADMIN_PASSWORD=${OWNCLOUD_ADMIN_PASSWORD}
      - OWNCLOUD_MYSQL_UTF8MB4=true
      - OWNCLOUD_REDIS_ENABLED=true
      - OWNCLOUD_REDIS_HOST=owncloud_redis

    healthcheck:
      test: ["CMD", "/usr/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - owncloud_files:/mnt/data
      - /mnt/kingston_128gb:/data/media/

  owncloud_db:
    image: mariadb:11 # minimum required ownCloud version is 10.9
    container_name: owncloud_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${OWNCLOUD_MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=owncloud
      - MYSQL_USER=owncloud
      - MYSQL_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    networks:
      - owncloud_internal
    command: ["--max-allowed-packet=128M", "--innodb-log-file-size=64M"]
    # healthcheck:
    #   test: ["CMD", "mysqladmin", "ping", "-u", "root", "--password=password"] # create a standalone script with password variable
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    volumes:
      - owncloud_db:/var/lib/mysql

  owncloud_redis:
    image: redis:6
    container_name: owncloud_redis
    restart: always
    networks:
      - owncloud_internal
    command: ["--databases", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - owncloud_redis:/data

volumes:
  owncloud_files:
  owncloud_db:
  owncloud_redis:

networks:
  caddy_shared:
    external: true
  owncloud_internal:
